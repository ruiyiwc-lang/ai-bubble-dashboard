<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI泡沫温度计</title>
<style>
:root{--bg:#0a0e1a;--card:#141824;--border:#1e2538;--text:#e0e4ef;--dim:#6b7394;--safe:#22c55e;--warn:#eab308;--danger:#ef4444;--accent:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:16px;max-width:900px;margin:0 auto}

/* Header */
.header{display:flex;align-items:center;gap:24px;padding:24px;background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:12px}
.gauge-wrap{position:relative;width:140px;height:140px;flex-shrink:0}
.gauge-wrap svg{width:140px;height:140px}
.gauge-bg{fill:none;stroke:var(--border);stroke-width:12}
.gauge-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .8s ease,stroke .5s}
.gauge-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-num{font-size:36px;font-weight:700;letter-spacing:-1px}
.gauge-lbl{font-size:12px;color:var(--dim)}
.hdr-info{flex:1}
.hdr-title{font-size:20px;font-weight:600;margin-bottom:4px}
.hdr-status{font-size:14px;margin-bottom:8px}
.hdr-meta{display:flex;gap:16px;flex-wrap:wrap}
.meta{font-size:13px;color:var(--dim)}
.meta b{color:var(--text);font-weight:500}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center}
.sum-lbl{font-size:12px;color:var(--dim);margin-bottom:4px}
.sum-val{font-size:18px;font-weight:600}

/* Section */
.sec{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-size:14px;font-weight:600}
.sec-score{font-size:13px;font-weight:500}

/* Indicator */
.ind{display:grid;grid-template-columns:1fr 80px 180px 50px;align-items:center;padding:10px 16px 2px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
.ind:last-child{border-bottom:none}
.ind-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ind-val{text-align:right;color:var(--dim);font-family:'SF Mono',Menlo,monospace;font-size:12px}
.ind-bar{display:flex;align-items:center;gap:4px;padding:0 4px;flex-direction:column}
.bar-wrap{display:flex;align-items:center;width:100%;gap:4px}
.bar-bound{font-size:9px;color:var(--dim);font-family:'SF Mono',Menlo,monospace;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .5s,background .3s}
.bar-sc{font-size:11px;color:var(--dim);font-family:'SF Mono',Menlo,monospace;width:32px;text-align:right}
.ind-st{text-align:center;font-size:13px}
.ind-rule{grid-column:1/-1;padding:0 16px 8px;font-size:11px;color:var(--dim);opacity:.7;font-family:'SF Mono',Menlo,monospace}

/* Trigger */
.trig{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
.trig:last-child{border-bottom:none}
.trig-r{font-weight:600}

/* Buy */
.buy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
.buy-card{padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.buy-name{font-size:13px;font-weight:500;margin-bottom:2px}
.buy-pe{font-size:12px;color:var(--dim)}
.buy-sig{font-size:12px;font-weight:500;margin-top:4px}

/* Macro */
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:12px}
.macro-item{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.02)}
.macro-lbl{font-size:11px;color:var(--dim)}
.macro-val{font-size:15px;font-weight:600}

/* Config */
.cfg-toggle{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;padding:6px 16px;width:100%;text-align:left;border-top:1px solid var(--border)}
.cfg-toggle:hover{color:var(--accent)}
.cfg{display:none;padding:12px 16px;background:rgba(0,0,0,.2);border-top:1px solid var(--border)}
.cfg.open{display:block}
.cfg-row{display:grid;grid-template-columns:1fr 55px 65px 65px;gap:6px;align-items:center;padding:3px 0;font-size:12px}
.cfg-input{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;width:100%;text-align:center}
.cfg-input:focus{outline:none;border-color:var(--accent)}
.cfg-reset{background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:4px 12px;font-size:11px;cursor:pointer;margin-top:8px}
.cfg-reset:hover{border-color:var(--danger);color:var(--danger)}
.bal-row{display:flex;gap:12px;align-items:center;padding:8px 16px;font-size:13px;flex-wrap:wrap}
.bal-input{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;width:50px;text-align:center}
.bal-input:focus{outline:none;border-color:var(--accent)}

/* Mobile */
@media(max-width:600px){
body{padding:8px}
.header{flex-direction:column;text-align:center;padding:16px}
.gauge-wrap,.gauge-wrap svg{width:120px;height:120px}
.gauge-num{font-size:28px}
.summary{grid-template-columns:1fr 1fr 1fr;gap:6px}
.sum-val{font-size:15px}
.ind{grid-template-columns:1fr 60px 140px 40px;font-size:12px}
.buy-grid{grid-template-columns:1fr}
.cfg-row{grid-template-columns:1fr 45px 55px 55px;font-size:11px}
}
.tsafe{color:var(--safe)}.twarn{color:var(--warn)}.tdanger{color:var(--danger)}
</style>
</head>
<body>

<div class="header">
<div class="gauge-wrap">
<svg viewBox="0 0 140 140">
<circle class="gauge-bg" cx="70" cy="70" r="58" stroke-dasharray="290" stroke-dashoffset="72" transform="rotate(135 70 70)"/>
<circle class="gauge-fill" id="gArc" cx="70" cy="70" r="58" stroke-dasharray="217.5 290" stroke-dashoffset="217.5" transform="rotate(135 70 70)"/>
</svg>
<div class="gauge-txt"><div class="gauge-num" id="gNum">--</div><div class="gauge-lbl">/ 100</div></div>
</div>
<div class="hdr-info">
<div class="hdr-title">AI泡沫温度计</div>
<div class="hdr-status" id="hStatus">加载中...</div>
<div class="hdr-meta">
<div class="meta">📅 <b id="hDate">--</b></div>
<div class="meta">门1 <b id="hGate">--</b></div>
</div>
<div id="hdrRule" style="margin-top:8px;font-size:11px;color:#6b7394;line-height:1.7;opacity:.85"></div>
</div>
</div>

<div class="summary">
<div class="sum-card"><div class="sum-lbl">⚖️ 天平比值</div><div class="sum-val" id="sBalance">--</div></div>
<div class="sum-card"><div class="sum-lbl">🎯 最近触发</div><div class="sum-val" id="sClosest">--</div></div>
<div class="sum-card"><div class="sum-lbl">📊 操作</div><div class="sum-val" id="sAction">--</div></div>
</div>

<div class="sec"><div class="sec-hdr"><span class="sec-title">🎯 触发距离 · 第1批260万</span></div><div id="trigBox"></div></div>

<div class="sec">
<div class="sec-hdr"><span class="sec-title">📊 第0.5层 · Timing · <span id="w05">40</span>%</span><span class="sec-score" id="sc05">--</span></div>
<div id="ind05"></div>
<button class="cfg-toggle" onclick="togCfg('05')">⚙️ 调整权重 / 阈值</button><div class="cfg" id="cfg05"></div>
</div>

<div class="sec">
<div class="sec-hdr"><span class="sec-title">📊 第零层 · 供应链 · <span id="w0">30</span>%</span><span class="sec-score" id="sc0">--</span></div>
<div id="ind0"></div>
<button class="cfg-toggle" onclick="togCfg('0')">⚙️ 调整权重 / 阈值</button><div class="cfg" id="cfg0"></div>
</div>

<div class="sec">
<div class="sec-hdr"><span class="sec-title">📊 第一层 · 价格 · <span id="w1">30</span>%</span><span class="sec-score" id="sc1">--</span></div>
<div id="ind1"></div>
<button class="cfg-toggle" onclick="togCfg('1')">⚙️ 调整权重 / 阈值</button><div class="cfg" id="cfg1"></div>
</div>

<div class="sec">
<div class="sec-hdr"><span class="sec-title">🇨🇳 科创50四档触发器 · v8.0铁桶</span><span class="sec-score" id="kc50State">--</span></div>
<div id="kc50Box"></div>
</div>

<div class="sec">
<div class="sec-hdr"><span class="sec-title">⚖️ 天平比值</span><span class="sec-score" id="balDisp">--</span></div>
<div class="bal-row">
<span>BABA增速%</span><input class="bal-input" id="balBG" type="number" value="45" onchange="updBal()">
<span>NVDA增速%</span><input class="bal-input" id="balNG" type="number" value="70" onchange="updBal()">
<span style="color:var(--dim);font-size:12px">= (BABA增速÷PE) ÷ (NVDA增速÷PE)</span>
</div>
</div>

<div class="sec"><div class="sec-hdr"><span class="sec-title">💰 买入信号</span></div><div class="buy-grid" id="buyBox"></div></div>
<div class="sec"><div class="sec-hdr"><span class="sec-title">🏦 宏观 & 铁桶仓</span></div><div class="macro-grid" id="macBox"></div></div>
<div class="sec"><div class="sec-hdr"><span class="sec-title">🇨🇳 A股个股</span></div><div id="ashBox"></div></div>

<script>
/* ===== LAYER DEFINITIONS (defaults) ===== */
const LAYERS={
'05':{wt:40,items:[
{k:'credit_spread',n:'Credit Spread',cn:'高收益债信用利差',u:'bps',w:20,s:350,d:450,dir:'asc'},
{k:'margin_debt',n:'Margin Debt',cn:'保证金负债',u:'$T',w:8,s:1.15,d:1.45,dir:'asc'},
{k:'growth_value',n:'Growth/Value',cn:'成长vs价值轮动',u:'月',w:6,s:2,d:6,dir:'asc'},
{k:'market_breadth',n:'Market Breadth',cn:'市场宽度>200DMA',u:'%',w:6,s:60,d:40,dir:'desc'}
]},
'0':{wt:30,items:[
{k:'openai_arr',n:'OpenAI/Anthropic',cn:'季度营收增速',u:'%QoQ',w:6,s:30,d:10,dir:'desc'},
{k:'enterprise_budget',n:'Enterprise',cn:'企业AI预算',u:'0-1',w:1,s:.33,d:.67,dir:'asc'},
{k:'token_price_war',n:'Token War',cn:'Token价格战',u:'0-1',w:5,s:.33,d:.67,dir:'asc'},
{k:'csp_capex',n:'CSP Capex',cn:'云厂资本开支',u:'0-1',w:8,s:.33,d:.67,dir:'asc'},
{k:'ipo_progress',n:'AI IPO',cn:'IPO进度',u:'0-1',w:1,s:.33,d:.67,dir:'asc'},
{k:'dram_spot',n:'DRAM Spot',cn:'DRAM现货溢价',u:'%',w:4,s:15,d:0,dir:'desc'},
{k:'cowos_lead',n:'CoWoS',cn:'先进封装交期',u:'月',w:3,s:5,d:3,dir:'desc'},
{k:'h100_price',n:'H100 Used',cn:'H100二手价',u:'$K',w:2,s:17,d:14,dir:'desc'}
]},
'1':{wt:30,items:[
{k:'nvda_pe',n:'NVDA Fwd PE',cn:'NVIDIA 英伟达 PE',u:'x',w:10,s:22,d:18,dir:'desc',zone:'海外'},
{k:'sox',n:'SOX',cn:'SOX 费城半导体指数',u:'%距高',w:6,s:10,d:25,dir:'asc',zone:'海外'},
{k:'tsm',n:'TSM',cn:'TSM 台积电',u:'%距高',w:5,s:10,d:25,dir:'asc',zone:'海外'},
{k:'sk_hynix',n:'SK Hynix',cn:'SK Hynix 海力士',u:'%距高',w:2,s:10,d:25,dir:'asc',zone:'海外'},
{k:'avgo',n:'AVGO',cn:'AVGO 博通',u:'%距高',w:3,s:10,d:25,dir:'asc',zone:'海外'},
{k:'mu',n:'MU',cn:'MU 美光',u:'%距高',w:2,s:10,d:25,dir:'asc',zone:'海外'},
{k:'xuchuang',n:'中际旭创',cn:'中际旭创 300308',u:'%距高',w:1,s:10,d:25,dir:'asc',zone:'国内'},
{k:'hudian',n:'沪电股份',cn:'沪电股份 002463',u:'%距高',w:1,s:10,d:25,dir:'asc',zone:'国内'},
{k:'smic',n:'中芯国际',cn:'中芯国际 688981',u:'%距高',w:1,s:10,d:25,dir:'asc',zone:'国内'},
{k:'etf_512480',n:'半导体ETF',cn:'半导体ETF 512480',u:'%距高',w:1,s:10,d:25,dir:'asc',zone:'国内'}
]}
};

const BUYS=[
{k:'tencent_pe',n:'腾讯',target:10,dir:'buy'},
{k:'baba_pe',n:'BABA',target:20,dir:'sell'},
{k:'tsm_pe',n:'TSM台积电',target:13,dir:'buy'},
{k:'asml_pe',n:'ASML光刻机',target:18,dir:'buy'}
];

let BAL={bg:45,ng:70};
const COL={safe:'#22c55e',warn:'#eab308',danger:'#ef4444'};
const layerMap={'05':'layer05','0':'layer0','1':'layer1'};

/* ===== SCORE ENGINE ===== */
function calcSc(v,s,d,dir){
if(v==null||isNaN(v))return 0;
if(dir==='asc'){
if(v<=s)return Math.max(0,v/Math.max(s,.01)*40);
if(v<=d)return 40+(v-s)/Math.max(d-s,.01)*30;
return Math.min(100,70+(v-d)/Math.max(d-s,.01)*30);
}else{
if(v>=s)return Math.max(0,40-((v-s)/Math.max(s,.01)*40));
if(v>=d)return 40+(s-v)/Math.max(s-d,.01)*30;
return Math.min(100,70+(d-v)/Math.max(s-d,.01)*30);
}}
function getSt(sc){if(sc<=40)return{t:'安全',c:'safe',e:'🟢'};if(sc<=70)return{t:'警戒',c:'warn',e:'🟡'};return{t:'危险',c:'danger',e:'🔴'};}

/* ===== CONFIG PERSISTENCE ===== */
function loadCfg(){try{
const s=localStorage.getItem('bubble_cfg_v3');if(!s)return;
const p=JSON.parse(s);
for(const lk in LAYERS){if(!p[lk])continue;
for(const it of LAYERS[lk].items){const sv=p[lk][it.k];if(sv){it.w=sv.w??it.w;it.s=sv.s??it.s;it.d=sv.d??it.d;}}
if(p[lk]._wt!=null)LAYERS[lk].wt=p[lk]._wt;}
if(p.bal){BAL.bg=p.bal.bg??BAL.bg;BAL.ng=p.bal.ng??BAL.ng;}
}catch(e){}}

function saveCfg(){try{
const o={bal:{bg:BAL.bg,ng:BAL.ng}};
for(const lk in LAYERS){o[lk]={_wt:LAYERS[lk].wt};for(const it of LAYERS[lk].items)o[lk][it.k]={w:it.w,s:it.s,d:it.d};}
localStorage.setItem('bubble_cfg_v3',JSON.stringify(o));
}catch(e){}}

function updCfg(lk,key,field,val){
const it=LAYERS[lk].items.find(i=>i.k===key);if(!it)return;
const n=parseFloat(val);if(isNaN(n))return;
if(field==='w')it.w=n;else if(field==='s')it.s=n;else if(field==='d')it.d=n;
saveCfg();renderAll();
}
function togCfg(lk){document.getElementById('cfg'+lk).classList.toggle('open')}
function resetCfg(){if(confirm('恢复所有权重和阈值到默认值？')){localStorage.removeItem('bubble_cfg_v3');location.reload();}}
function updBal(){
BAL.bg=parseFloat(document.getElementById('balBG').value)||45;
BAL.ng=parseFloat(document.getElementById('balNG').value)||70;
saveCfg();renderAll();
}

/* ===== MAIN RENDER ===== */
function renderAll(){
const D=window.BUBBLE_DATA;if(!D){document.getElementById('hStatus').textContent='❌ 未加载 bubble-data.js';return;}

// Init balance from data
if(D.manual){
  if(!localStorage.getItem('bubble_cfg_v3')){
    BAL.bg=D.manual.baba_growth??BAL.bg;
    BAL.ng=D.manual.nvda_growth??BAL.ng;
  }
}
document.getElementById('balBG').value=BAL.bg;
document.getElementById('balNG').value=BAL.ng;

// Date & Gate1
document.getElementById('hDate').textContent=D.updateDate||'--';
const g1=D.manual?.gate1;
const ge=document.getElementById('hGate');
ge.textContent=g1?'✓通过':'✗不通过';ge.style.color=g1?COL.safe:COL.danger;

// Calculate all layers
const R={};
for(const lk in LAYERS){
const L=LAYERS[lk];const ld=D[layerMap[lk]]||{};
let ts=0,tw=0;const scores=[];
for(const it of L.items){
const v=ld[it.k]?.value??null;
const sc=v!=null?Math.round(calcSc(v,it.s,it.d,it.dir)):0;
scores.push({...it,val:v,sc,date:ld[it.k]?.date||''});
ts+=sc*it.w;tw+=it.w;
}
const ls=tw>0?Math.round(ts/tw):0;
R[lk]={sc:ls,wt:L.wt,scores,nWarn:scores.filter(s=>s.sc>40).length,nDanger:scores.filter(s=>s.sc>70).length};

// Render indicator rows
let h='';
let lastZone='';
for(const s of scores){const st_=getSt(s.sc);
if(s.zone&&s.zone!==lastZone){lastZone=s.zone;h+=`<div style="padding:6px 16px 2px;font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)">${s.zone==='海外'?'🌍 海外':'🇨🇳 国内'}</div>`;}
const dv=s.val!=null?(typeof s.val==='number'?(Math.abs(s.val)>=100?Math.round(s.val):s.val):s.val):'--';
const dvUnit=s.u?(dv+' '+s.u):dv;
const dirLabel=s.dir==='asc'?'↑越高越危':'↓越低越危';
const ruleText=`🟢安全≤${s.s}${s.u||''} 🔴危险≥${s.d}${s.u||''} ${dirLabel} W=${s.w}`;
const ruleTextDesc=`🟢安全≥${s.s}${s.u||''} 🔴危险≤${s.d}${s.u||''} ${dirLabel} W=${s.w}`;
const rule=s.dir==='asc'?ruleText:ruleTextDesc;
// 进度条：左=安全线 右=危险线 fill=当前值位置
let barPct=0,leftBound,rightBound;
if(s.dir==='asc'){
  leftBound=s.s; rightBound=s.d;
  if(s.val!=null){
    if(s.val<=s.s)barPct=Math.max(0,(s.val/Math.max(s.s,.01))*40);
    else if(s.val<=s.d)barPct=40+((s.val-s.s)/Math.max(s.d-s.s,.01))*40;
    else barPct=Math.min(100,80+((s.val-s.d)/Math.max(s.d-s.s,.01))*20);
  }
}else{
  leftBound=s.d; rightBound=s.s;
  if(s.val!=null){
    if(s.val>=s.s)barPct=Math.max(0,((s.s-s.val+s.s)/Math.max(s.s,.01))*20);
    else if(s.val>=s.d)barPct=40+((s.s-s.val)/Math.max(s.s-s.d,.01))*40;
    else barPct=Math.min(100,80+((s.d-s.val)/Math.max(s.s-s.d,.01))*20);
  }
}
h+=`<div class="ind"><div class="ind-name" title="${s.n} (${s.date})">${s.cn}</div><div class="ind-val">${dvUnit}</div><div class="ind-bar"><div class="bar-wrap"><div class="bar-bound" style="color:var(--safe)">${leftBound}</div><div class="bar-track"><div class="bar-fill" style="width:${barPct}%;background:${COL[st_.c]}"></div></div><div class="bar-bound" style="color:var(--danger)">${rightBound}</div></div></div><div class="ind-st">${st_.e}${s.sc}分</div><div class="ind-rule">${rule}</div></div>`;
}
document.getElementById('ind'+lk).innerHTML=h;

// Layer score badge
const lst=getSt(ls);
document.getElementById('sc'+lk).textContent=`小计 ${ls} ${lst.e}`;
document.getElementById('sc'+lk).className='sec-score t'+lst.c;
document.getElementById('w'+lk).textContent=L.wt;

// Config panel
let ch=`<div class="cfg-row" style="color:var(--dim)"><div>指标</div><div>权重</div><div>安全线</div><div>危险线</div></div>`;
for(const it of L.items){
ch+=`<div class="cfg-row"><div>${it.n}</div><input class="cfg-input" type="number" value="${it.w}" onchange="updCfg('${lk}','${it.k}','w',this.value)"><input class="cfg-input" type="number" value="${it.s}" step="any" onchange="updCfg('${lk}','${it.k}','s',this.value)"><input class="cfg-input" type="number" value="${it.d}" step="any" onchange="updCfg('${lk}','${it.k}','d',this.value)"></div>`;
}
ch+=`<button class="cfg-reset" onclick="resetCfg()">恢复默认</button>`;
document.getElementById('cfg'+lk).innerHTML=ch;
}

// Temperature gauge
const twt=R['05'].wt+R['0'].wt+R['1'].wt;
const temp=twt>0?Math.round((R['05'].sc*R['05'].wt+R['0'].sc*R['0'].wt+R['1'].sc*R['1'].wt)/twt):0;
const tSt=getSt(temp);

// Triggers — 按权重比例而非个数
// 计算每组"警戒态权重/总权重"
function warnRatio(scores,filter){
  let wW=0,wT=0;
  for(const s of scores){if(filter&&!filter(s))continue; wT+=s.w; if(s.sc>40)wW+=s.w;}
  return wT>0?wW/wT:0;
}
function dangerRatio(scores,filter){
  let wW=0,wT=0;
  for(const s of scores){if(filter&&!filter(s))continue; wT+=s.w; if(s.sc>70)wW+=s.w;}
  return wT>0?wW/wT:0;
}

const wrDomestic=warnRatio(R['1'].scores,s=>s.zone==='国内');

 sub:`当前: 0.5层=${(wr05*100).toFixed(0)}% · 零层=${(wr0*100).toFixed(0)}%`,

{l:'② 一层海外警戒权重≥50% + 国内警戒权重≥50%',

{l:'③ 零层危险权重≥25% + 全局警戒权重≥50%',
 sub:`当前: 零层危险=${(dr0*100).toFixed(0)}% · 全局警戒=${(wrAll*100).toFixed(0)}%`,

}

  </div>`;

  // 4档标记线
  tiers.forEach(t=>{
    const pos=Math.max(0,Math.min(100,((barMax-t.level)/(barMax-barMin))*100));
    const isHit=cur<=t.level;
    kh+=`<div style="position:absolute;left:${pos}%;top:-2px;height:14px;width:2px;background:${isHit?COL.danger:'var(--dim)'};opacity:.8"></div>
         <div style="position:absolute;left:${pos}%;top:14px;font-size:9px;color:${isHit?COL.danger:'var(--dim)'};transform:translateX(-50%);white-space:nowrap;font-family:'SF Mono',monospace">${t.level}</div>`;
  });
  kh+=`</div><div style="height:14px"></div></div>`;
  // 四档操作清单
  kh+=`<div style="padding:8px 0">`;
  tiers.forEach((t,i)=>{
    const isHit=cur<=t.level;
    const isCurrent=i===hitIdx;
    const bgColor=isCurrent?'rgba(239,68,68,.08)':isHit?'rgba(234,179,8,.05)':'transparent';
    const lblColor=isHit?COL.danger:'var(--text)';
    const lblEmoji=isCurrent?'⚡':isHit?'✓':'○';
    kh+=`<div style="padding:8px 16px;background:${bgColor};border-left:3px solid ${isHit?COL.danger:'var(--border)'};margin-bottom:2px;font-size:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap">
        <div><span style="font-weight:600;color:${lblColor}">${lblEmoji} ${t.label}</span> <span style="color:var(--dim);font-family:'SF Mono',monospace">≤${t.level}点 · -${t.drop}%</span></div>
        <div style="color:${isHit?COL.danger:'var(--dim)'};font-weight:${isHit?'600':'400'}">${t.action}</div>
      </div>
      <div style="font-size:11px;color:var(--dim);opacity:.85;margin-top:3px">${t.items}</div>
    </div>`;
  });
  kh+=`</div>`;
  document.getElementById('kc50Box').innerHTML=kh;
}
